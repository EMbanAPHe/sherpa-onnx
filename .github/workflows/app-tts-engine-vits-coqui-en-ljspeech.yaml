name: app-tts-engine-vits-coqui-en-ljspeech

on:
  workflow_dispatch:

jobs:
  build-tts-engine:
    runs-on: ubuntu-latest
    env:
      MODEL_ARCHIVE_URL: "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-coqui-en-ljspeech.tar.bz2"
      MODEL_DIR: "vits-coqui-en-ljspeech"
      MODEL_NAME: "model.onnx"
      VOICES: ""
      APP_ID_SUFFIX: ".vits_coqui_en_ljspeech"
      APP_NAME: "TTS Coqui LJSpeech"
      APK_BASENAME: "SherpaTtsEngine-Coqui-en-ljspeech"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk: 26.1.10909125
          build-tools: 34.0.0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}

      # 1. Build sherpa-onnx-jni.so from source so it includes generateStreamImpl
      #    (used only if future code paths need it; current TtsService uses generateWithCallback
      #     which is already in the JitPack AAR, so this .so replaces the AAR's copy).
      - name: Build JNI library (arm64-v8a)
        run: |
          set -euxo pipefail
          ./build-android-arm64-v8a.sh

      - name: Install JNI library
        run: |
          set -euxo pipefail
          mkdir -p android/SherpaOnnxTtsEngine/app/src/main/jniLibs/arm64-v8a
          cp -v build-android-arm64-v8a/install/lib/*.so \
             android/SherpaOnnxTtsEngine/app/src/main/jniLibs/arm64-v8a/

      # 2. Download and validate model
      - name: Download model
        run: |
          set -euxo pipefail
          cd android/SherpaOnnxTtsEngine/app/src/main/assets
          wget -q --show-progress "$MODEL_ARCHIVE_URL" -O model.tar.bz2
          tar -xjf model.tar.bz2
          rm model.tar.bz2
          test -f "$MODEL_DIR/$MODEL_NAME"
          test -f "$MODEL_DIR/tokens.txt"
          test -d "$MODEL_DIR/espeak-ng-data"
          echo "Model extracted to $(pwd)/$MODEL_DIR"

      # 3. Inject model config via gradle.properties — no sed, no fragile regex.
      #    build.gradle.kts reads TTSENGINE_* properties and writes them to
      #    BuildConfig so TtsEngine.kt can load them at runtime.
      - name: Write model config to gradle.properties
        run: |
          set -euxo pipefail
          PROPS="android/SherpaOnnxTtsEngine/gradle.properties"
          # Remove any stale values from a previous run
          grep -v "^TTSENGINE_" "$PROPS" > /tmp/gradle.properties.tmp || true
          mv /tmp/gradle.properties.tmp "$PROPS"
          # Append this model's config
          {
            echo "TTSENGINE_MODEL_DIR=$MODEL_DIR"
            echo "TTSENGINE_MODEL_NAME=$MODEL_NAME"
            echo "TTSENGINE_VOICES=$VOICES"
            echo "TTSENGINE_DATA_DIR=$MODEL_DIR/espeak-ng-data"
            echo "TTSENGINE_LANG=eng"
            echo "TTSENGINE_IS_KITTEN=false"
          } >> "$PROPS"
          echo "gradle.properties written:"
          grep "^TTSENGINE_" "$PROPS"

      # 4. Patch app_name string resource for this variant
      - name: Patch app_name
        run: |
          set -euxo pipefail
          STRINGS_FILE="android/SherpaOnnxTtsEngine/app/src/main/res/values/strings.xml"
          sed -i 's#<string name="app_name">.*</string>#<string name="app_name">'"\"'</string>#' "$STRINGS_FILE"
          echo "app_name set to $APP_NAME"

      # 5. Build APK with APP_ID_SUFFIX for side-by-side installation
      - name: Build APK
        working-directory: android/SherpaOnnxTtsEngine
        run: |
          set -euxo pipefail
          ./gradlew assembleDebug -PAPP_ID_SUFFIX="$APP_ID_SUFFIX"

      - name: Rename APK
        run: |
          set -euxo pipefail
          cd android/SherpaOnnxTtsEngine/app/build/outputs/apk/debug
          mv app-debug.apk "$APK_BASENAME.apk"
          echo "APK: $APK_BASENAME.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME }}
          path: android/SherpaOnnxTtsEngine/app/build/outputs/apk/debug/${{ env.APK_BASENAME }}.apk
          if-no-files-found: error
