name: app-tts-engine-vits-piper-en_GB-vctk-medium

on:
  workflow_dispatch:

jobs:
  build-tts-engine:
    runs-on: ubuntu-latest
    env:
      MODEL_ARCHIVE_URL: "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_GB-vctk-medium.tar.bz2"
      MODEL_DIR: "vits-piper-en_GB-vctk-medium"
      MODEL_NAME: "en_GB-vctk-medium.onnx"
      VOICES: ""
      APP_ID_SUFFIX: ".vits_piper_en_GB_vctk_medium"
      APP_NAME: "TTS Piper GB VCTK medium"
      APK_BASENAME: "SherpaTtsEngine-Piper-en_GB-vctk-medium"
      # Build with android-27 to enable NNAPI support in the native library.
      # The app still runs on Android 5+ (minSdk=21); android-27 is the NDK
      # API level used during compilation, not the minimum device requirement.
      SHERPA_ONNX_ANDROID_PLATFORM: android-27

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk: 26.1.10909125
          build-tools: 34.0.0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}

      - name: Build JNI library (arm64-v8a)
        run: |
          set -euxo pipefail
          ./build-android-arm64-v8a.sh

      - name: Install JNI library
        run: |
          set -euxo pipefail
          mkdir -p android/SherpaOnnxTtsEngine/app/src/main/jniLibs/arm64-v8a
          cp -v build-android-arm64-v8a/install/lib/*.so \
             android/SherpaOnnxTtsEngine/app/src/main/jniLibs/arm64-v8a/

      # Download the pre-built sherpa-onnx AAR from GitHub releases.
      # Bypasses JitPack entirely.
      - name: Download sherpa-onnx AAR
        run: |
          set -euxo pipefail
          mkdir -p android/SherpaOnnxTtsEngine/app/libs
          wget -q --show-progress "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.15/sherpa-onnx-1.12.15.aar" \
            -O android/SherpaOnnxTtsEngine/app/libs/sherpa-onnx-1.12.15.aar
          echo "AAR: $(du -h android/SherpaOnnxTtsEngine/app/libs/sherpa-onnx-1.12.15.aar)"

      - name: Download model
        run: |
          set -euxo pipefail
          cd android/SherpaOnnxTtsEngine/app/src/main/assets
          wget -q --show-progress "$MODEL_ARCHIVE_URL" -O model.tar.bz2
          tar -xjf model.tar.bz2
          rm model.tar.bz2
          test -f "$MODEL_DIR/en_GB-vctk-medium.onnx"
          test -f "$MODEL_DIR/tokens.txt"
          test -d "$MODEL_DIR/espeak-ng-data"
          echo "Model extracted to $(pwd)/$MODEL_DIR"

      - name: Write model config to gradle.properties
        run: |
          set -euxo pipefail
          PROPS="android/SherpaOnnxTtsEngine/gradle.properties"
          grep -v "^TTSENGINE_" "$PROPS" > /tmp/gradle.properties.tmp || true
          mv /tmp/gradle.properties.tmp "$PROPS"
          echo "TTSENGINE_MODEL_DIR=$MODEL_DIR"    >> "$PROPS"
          echo "TTSENGINE_MODEL_NAME=$MODEL_NAME"  >> "$PROPS"
          echo "TTSENGINE_VOICES=$VOICES"          >> "$PROPS"
          echo "TTSENGINE_DATA_DIR=$MODEL_DIR/espeak-ng-data" >> "$PROPS"
          echo "TTSENGINE_LANG=eng"                >> "$PROPS"
          echo "TTSENGINE_IS_KITTEN=false"          >> "$PROPS"
          echo "gradle.properties written:"
          grep "^TTSENGINE_" "$PROPS"

      - name: Patch app_name
        run: |
          set -euxo pipefail
          STRINGS_FILE="android/SherpaOnnxTtsEngine/app/src/main/res/values/strings.xml"
          python3 -c "import base64,os; exec(base64.b64decode('').decode())" "$STRINGS_FILE"
          echo "app_name set to $APP_NAME"

      - name: Build APK
        working-directory: android/SherpaOnnxTtsEngine
        run: |
          set -euxo pipefail
          ./gradlew assembleDebug -PAPP_ID_SUFFIX="$APP_ID_SUFFIX"

      - name: Rename APK
        run: |
          set -euxo pipefail
          cd android/SherpaOnnxTtsEngine/app/build/outputs/apk/debug
          mv app-debug.apk "$APK_BASENAME.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME }}
          path: android/SherpaOnnxTtsEngine/app/build/outputs/apk/debug/${{ env.APK_BASENAME }}.apk
          if-no-files-found: error
